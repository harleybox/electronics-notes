<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图1.20 — RC 定时器电路</title>
<link rel="stylesheet" href="../assets/circuit.css">
<style>
  .gauge-label { font-size:11px; color:var(--muted); margin-bottom:6px; }
  .gauge-track { background:#1e2535; border:1px solid var(--border); border-radius:4px; height:20px; overflow:hidden; }
  .gauge-fill  { height:100%; border-radius:3px; transition:width .05s linear; background:linear-gradient(90deg,#1a6b3a,#22d36a); width:0%; }
  .gauge-value { font-size:12px; color:var(--green); margin-top:4px; font-variant-numeric:tabular-nums; }
  #btn-mute { margin-top:10px; }
  #btn-mute.muted { color:var(--faint); border-color:var(--border); }
  #stage-note.buzzing { color:var(--amber); }
</style>
</head>
<body>

<h1>图1.20 — RC 定时器电路</h1>

<div class="stage">
  <div id="circuit-wrap">
    <svg id="svg" width="500" height="380" viewBox="0 0 500 380"></svg>
  </div>

  <div class="panel">
    <div>
      <div class="panel-title">C₁ 充电电压</div>
      <div class="gauge-label">当前电压</div>
      <div class="gauge-track"><div class="gauge-fill" id="gfill"></div></div>
      <div class="gauge-value" id="gval">0.00 V</div>
    </div>

    <div>
      <div class="panel-title">电路状态</div>
      <div id="st-s"    class="status-item"><div class="status-dot"></div><span>S 已按下（开始充电）</span></div>
      <div id="st-chg"  class="status-item" style="margin-top:8px"><div class="status-dot"></div><span>C₁ 充电中</span></div>
      <div id="st-trig" class="status-item warn" style="margin-top:8px"><div class="status-dot"></div><span>VS 触发导通</span></div>
      <div id="st-buz"  class="status-item warn" style="margin-top:8px"><div class="status-dot"></div><span>蜂鸣器响</span></div>
      <div id="st-dis"  class="status-item" style="margin-top:8px"><div class="status-dot"></div><span>R₂ 放电（重置）</span></div>
    </div>

    <div>
      <div class="panel-title">操作</div>
      <button class="btn" id="btn-s">按住 S 开始计时</button>
      <button class="btn" id="btn-mute">🔊 蜂鸣声：开</button>
    </div>

    <div>
      <div class="panel-title">说明</div>
      <div class="stage-note" id="stage-note">按住按键 S，5V 电源经 R₁ 给 C₁ 充电。<br>C₁ 电压升到门槛 → VS 导通、蜂鸣器响。松开后 C₁ 经 R₂ 放电复位。</div>
    </div>
  </div>
</div>

<script src="../assets/circuit-kit.js?v=11"></script>
<script>
const svg = document.getElementById('svg');
const $ = id => document.getElementById(id);
svg.innerHTML = Circuit.defs();
const c = new Circuit(svg);

// ── place components ──
const SRC = c.source(60, 195, { label: '5V' });                          // pos[60,175] neg[60,215]
const SW  = c.switchH(140, 110, { label: 'S' });                         // a[110,110] b[170,110]
const R1  = c.resistor(210, 160, { label: 'R₁', value: '10k' });         // a[210,130] b[210,190]
const C1  = c.capacitor(210, 250, { label: 'C₁' });                      // a[210,225] b[210,275]
const R2  = c.resistor(270, 250, { label: 'R₂', value: '47k' });         // a[270,220] b[270,280]
const D2  = c.diode(320, 207, { label: 'D₂' });                          // anode[311,207] cathode[329,207]
const D1  = c.diode(360, 207, { label: 'D₁' });                          // anode[351,207] cathode[369,207]
const BUZ = c.buzzer(450, 165, { label: 'BUZ₁' });                       // a[450,137] b[450,193]
const VS  = c.scr(450, 255, { label: 'VS', sub: 'S6012R', dir: 'v' });   // anode[450,246] cathode[450,264] gate[420,264]
const GND = c.ground(135, 320);

// ── wiring ──
// VCC rail (top): source + → up → switch → both branches
c.wire(SRC.pos, [60, 110], { vfirst: true });
c.wire([60, 110], SW.a);
c.wire(SW.b, [210, 110]);
c.wire([210, 110], [450, 110]);
// charge branch: VCC → R1 → C1 → GND
c.wire([210, 110], R1.a);
c.wire(R1.b, C1.a); c.node([210, 207]);          // NODE (R1 / C1 / R2 / D2 junction)
c.wire(C1.b, [210, 320]);
// pulldown + discharge resistor: NODE → R2 → GND (parallel with C1)
c.wire([210, 207], [270, 207]); c.node([270, 207]);
c.wire([270, 207], R2.a);
c.wire(R2.b, [270, 320]);
// trigger chain: NODE → D2 → D1 → VS gate
c.wire([270, 207], D2.anode);
c.wire(D2.cathode, D1.anode);
c.wire(D1.cathode, [420, 207]); c.wire([420, 207], VS.gate);
// output branch: VCC → BUZ → VS → GND
c.wire([450, 110], BUZ.a);
c.wire(BUZ.b, VS.anode);
c.wire(VS.cathode, [450, 320]);
// GND rail (bottom)
c.wire(SRC.neg, [60, 320], { vfirst: true });
c.wire([60, 320], [450, 320]);
// junction dots at the 3-way taps (consistent with the other figures)
c.node([210, 110]);   // VCC rail ┬ charge branch
c.node([210, 320]);   // GND rail ┬ C1
c.node([270, 320]);   // GND rail ┬ R2

c.fit();

// ── current paths (each state = a set of live sub-paths) ──
// charging (S down, before trigger): VCC→R1→{C1, R2}→GND
const chargeSegs = [
  [[60,188],[60,110],[210,110],[210,320],[60,320],[60,202]],   // main charge loop (covers battery leads)
  [[210,207],[270,207],[270,320]]                              // R2 pulldown branch
];
// triggered: charge + R2 + trigger chain (NODE→D2→D1→gate) + output (BUZ→VS)
const trigSegs = [
  [[60,188],[60,110],[450,110],[450,320],[60,320],[60,202]],   // rails + BUZ + VS (output loop)
  [[210,110],[210,320]],                                       // charge vertical (R1,C1)
  [[210,207],[270,207],[270,320]],                             // R2 branch
  [[270,207],[420,207],[420,264]]                              // trigger chain → gate
];
// discharging (S open): C1 ∥ R2 loop, NODE→R2→GND→back to C1
const dischargeSegs = [
  [[210,245],[210,207],[270,207],[270,320]],                   // C1 top-plate lead → NODE → R2 → GND
  [[210,255],[210,320],[270,320]]                              // C1 bottom-plate lead → bottom rail → R2 bottom
];
// particle flow paths (source + → ... → source −)
const chargeFlow = [[60,175],[60,110],[210,110],[210,320],[60,320],[60,215]];
const outFlow    = [[60,175],[60,110],[450,110],[450,320],[60,320],[60,215]];
const pCharge = c.particles(chargeFlow);
const pOut    = c.particles(outFlow);
function allGray() { c.lightPaths([], '#22d36a'); }

// ── physics ──
const VCC = 5.0, VTRIG = 2.8, TAU = 4000;
let voltage = 0, pressing = false, buzzing = false;
let startTime = null, v0 = 0, rafId = null;
let dischargeStart = null, vDischarge = 0;

function setStatus(id, on) { $(id).classList.toggle('active', on); }
function updateGauge(v) {
  const pct = Math.min(100, (v / VCC) * 100);
  $('gfill').style.width = pct + '%';
  $('gval').textContent = v.toFixed(2) + ' V';
  C1.setCharge(v / VCC);
  $('gfill').style.background = v >= VTRIG ? 'linear-gradient(90deg,#6b2020,#e05050)' : 'linear-gradient(90deg,#1a6b3a,#22d36a)';
  $('gval').style.color = v >= VTRIG ? '#e05050' : '#22d36a';
}

function trigger() {
  buzzing = true;
  setStatus('st-trig', true); setStatus('st-buz', true);
  VS.setOn(true); BUZ.setRinging(true);
  c.lightPaths(trigSegs, '#f5a623');
  pOut.set({ on: true, color: '#f5a623', speed: 1.4 });
  $('stage-note').className = 'stage-note buzzing';
  $('stage-note').innerHTML = '⚠ C₁ 电压达到触发门槛！<br>VS 导通，电源经蜂鸣器→VS→地形成回路，蜂鸣器响，定时结束。';
  startBuzzSound();
}
function untrigger() {
  buzzing = false;
  setStatus('st-trig', false); setStatus('st-buz', false);
  VS.setOn(false); BUZ.setRinging(false);
  pOut.set({ on: false });
  stopBuzzSound();
}

function tick(ts) {
  if (pressing) {
    if (!startTime) { startTime = ts; v0 = voltage; }
    const elapsed = ts - startTime;
    voltage = VCC - (VCC - v0) * Math.exp(-elapsed / TAU);
    updateGauge(voltage);
    setStatus('st-chg', true);
    // charge current decreases as C1 fills → particle speed ∝ (VCC − v)
    pCharge.set({ on: true, color: '#22d36a', speed: 0.5 + (VCC - voltage) / VCC * 1.2 });
    if (!buzzing) c.lightPaths(chargeSegs, '#22d36a');
    if (voltage >= VTRIG && !buzzing) trigger();
  }
  rafId = requestAnimationFrame(tick);
}

// ── Web Audio buzzer ──
let audioCtx = null, buzzOsc = null, buzzGain = null, soundOn = true;
function ensureAudio() {
  if (!audioCtx) { const AC = window.AudioContext || window.webkitAudioContext; audioCtx = new AC(); }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function startBuzzSound() {
  if (!soundOn) return;
  ensureAudio();
  if (buzzOsc) return;
  buzzOsc = audioCtx.createOscillator(); buzzGain = audioCtx.createGain();
  buzzOsc.type = 'square'; buzzOsc.frequency.value = 2700; buzzGain.gain.value = 0.0;
  buzzOsc.connect(buzzGain).connect(audioCtx.destination); buzzOsc.start();
  buzzGain.gain.setTargetAtTime(0.12, audioCtx.currentTime, 0.01);
}
function stopBuzzSound() {
  if (!buzzOsc) return;
  const osc = buzzOsc, g = buzzGain;
  g.gain.setTargetAtTime(0.0, audioCtx.currentTime, 0.02);
  setTimeout(() => { try { osc.stop(); } catch (e) {} }, 80);
  buzzOsc = null; buzzGain = null;
}
$('btn-mute').addEventListener('click', () => {
  soundOn = !soundOn;
  $('btn-mute').textContent = soundOn ? '🔊 蜂鸣声：开' : '🔇 蜂鸣声：关';
  $('btn-mute').classList.toggle('muted', !soundOn);
  if (!soundOn) stopBuzzSound(); else if (buzzing) startBuzzSound();
});

// ── press / release ──
function startPress() {
  if (soundOn) ensureAudio();
  pressing = true; startTime = null; dischargeStart = null;
  setStatus('st-s', true); setStatus('st-dis', false);
  SW.setClosed(true);
  $('btn-s').classList.add('on'); $('btn-s').textContent = '松开 S 停止';
  if (!rafId) rafId = requestAnimationFrame(tick);
}
function stopPress() {
  pressing = false; startTime = null;
  setStatus('st-s', false); setStatus('st-chg', false);
  SW.setClosed(false);
  $('btn-s').classList.remove('on'); $('btn-s').textContent = '按住 S 开始计时';
  if (buzzing) untrigger();
  pCharge.set({ on: false });
  // discharge through R2
  vDischarge = voltage; dischargeStart = performance.now();
  setStatus('st-dis', true);
  $('stage-note').className = 'stage-note';
  $('stage-note').innerHTML = 'S 断开，C₁ 通过 R₂ 放电中…<br>电压归零后可再次计时。';
  c.lightPaths(dischargeSegs, '#22d36a'); // C1 ∥ R2 discharge loop
  animDischarge();
}
function animDischarge() {
  if (!dischargeStart) return;
  const elapsed = performance.now() - dischargeStart;
  voltage = vDischarge * Math.exp(-elapsed / 800);
  updateGauge(voltage);
  if (voltage > 0.02) {
    requestAnimationFrame(animDischarge);
  } else {
    voltage = 0; updateGauge(0);
    setStatus('st-dis', false);
    $('stage-note').innerHTML = 'C₁ 已放电清零，可重新按 S 开始新的计时。';
    allGray();
    cancelAnimationFrame(rafId); rafId = null;
  }
}

$('btn-s').addEventListener('mousedown', startPress);
$('btn-s').addEventListener('touchstart', e => { e.preventDefault(); startPress(); });
document.addEventListener('mouseup', () => { if (pressing) stopPress(); });
document.addEventListener('touchend', () => { if (pressing) stopPress(); });

updateGauge(0);
allGray();
</script>
</body>
</html>
