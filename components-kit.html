<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>组件图例库（引擎生成）</title>
<link rel="stylesheet" href="assets/circuit.css">
<style>
  body { justify-content: flex-start; padding: 40px 20px 60px; }
  .lib { width: 100%; max-width: 960px; margin: 0 auto; }
  .sub { font-size: 12px; color: var(--dim); margin: -8px 0 28px; text-align: center; line-height: 1.7; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 16px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; }
  .symbolbox { background: #10141d; border: 1px solid var(--border); border-radius: 8px; padding: 4px; margin-bottom: 10px; }
  .card svg { display: block; margin: 0 auto; }
  .name { font-size: 13px; color: var(--txt); }
  .note { font-size: 10px; color: var(--dim); margin-top: 5px; line-height: 1.55; }
  .footer { font-size: 11px; color: var(--dim); margin-top: 28px; line-height: 1.8; text-align: center; }
  .footer a { color: var(--green); text-decoration: none; }
</style>
</head>
<body>
<div class="lib">
  <h1>组件图例库 · 引擎生成</h1>
  <div class="sub">下面每个符号都是用 <b style="color:var(--muted)">circuit-kit.js</b> 引擎当场画的——<br>
    和实际电路图里用的<b style="color:var(--muted)">完全是同一份代码</b>，不会再各画各的、对不上。</div>
  <div class="grid" id="grid"></div>
  <div class="footer">
    每个符号都由引擎当场绘制，和电路图共用同一份代码。<br>
    <a href="index.html">← 返回首页</a>
  </div>
</div>

<script src="assets/circuit-kit.js?v=10"></script>
<script>
// Each entry renders ONE component via the engine, centered in a small card SVG.
// 横/竖两个朝向放在一起，便于对照。
const ITEMS = [
  { name: '电源 · 竖版', note: '长板正极(橙) / 短板负极(灰) + 数字电压',
    draw: (c) => c.source(75, 55, { label: '5V' }) },
  { name: '电源 · 横版', note: 'dir:"h" — 左负右正',
    draw: (c) => c.source(75, 55, { label: '5V', dir: 'h' }) },
  { name: '固定电阻 · 竖版', note: '矩形方块；上下两脚',
    draw: (c) => c.resistor(72, 55, { label: 'R', value: '10k' }) },
  { name: '固定电阻 · 横版', note: 'dir:"h" — 左右两脚',
    draw: (c) => c.resistor(75, 50, { label: 'R', value: '10k', dir: 'h' }) },
  { name: 'LED · 竖版（亮）', note: '三角+阴极杠+柔和光晕；通电发光',
    draw: (c) => { const d = c.led(72, 52, { label: 'D' }); d.set({ color: 'green', b: 1 }); return d; } },
  { name: 'LED · 横版（亮）', note: 'dir:"h" — 三角朝右，阳极左/阴极右',
    draw: (c) => { const d = c.led(72, 52, { label: 'D', dir: 'h' }); d.set({ color: 'green', b: 1 }); return d; } },
  { name: 'LED · 烧毁', note: '过流损坏 → 变灰 + 红叉（12V 那个状态）',
    draw: (c) => { const d = c.led(72, 52, { label: 'D' }); d.set({ color: 'burnt' }); return d; } },
  { name: '开关 · 断开', note: '斜臂离开触点 = 断路（无电流）',
    draw: (c) => { const s = c.switchH(75, 55, { label: 'S' }); s.setClosed(false); return s; } },
  { name: '开关 · 闭合', note: '斜臂搭上触点 = 导通（绿）',
    draw: (c) => { const s = c.switchH(75, 55, { label: 'S' }); s.setClosed(true); return s; } },
  { name: '接地 GND', note: '0V 参考点 / 电源负极返回',
    draw: (c) => c.ground(75, 40) },
  { name: '电压表', note: '圆圈+读数；并联测电压，理想内阻∞、不取电流',
    draw: (c) => { const v = c.voltmeter(70, 55); v.setReading('+6.00'); return v; } },
  { name: '单片机引脚', note: '高阻输入：只读电压、不取电流（支路保持灰）',
    draw: (c) => c.mcu(55, 55, { sub: '输入引脚' }) },
  { name: '电容 · 竖版', note: '两块平行极板（蓝）；上下两脚，可显示充电量',
    draw: (c) => { const cap = c.capacitor(75, 55, { label: 'C' }); cap.setCharge(0.7); return cap; } },
  { name: '电容 · 横版', note: 'dir:"h" — 极板竖放，左右两脚',
    draw: (c) => c.capacitor(75, 55, { label: 'C', dir: 'h' }) },
  { name: '二极管 · 横版', note: '三角+阴极杠；阳极左/阴极右，单向导通',
    draw: (c) => c.diode(75, 55, { label: 'D' }) },
  { name: '二极管 · 竖版', note: 'dir:"v" — 阳极上/阴极下',
    draw: (c) => c.diode(75, 52, { label: 'D', dir: 'v' }) },
  { name: '晶闸管 VS · 横版（导通）', note: '阳极A左/阴极K右；下方虚线=门极G(触发控制端)。门极触发后一直导通（变红）',
    draw: (c) => { const s = c.scr(70, 50, { label: 'VS', sub: 'S6012R' }); s.setOn(true); return s; } },
  { name: '晶闸管 VS · 竖版（导通）', note: 'dir:"v" — 阳极A上/阴极K下，门极G在左侧',
    draw: (c) => { const s = c.scr(72, 52, { label: 'VS', dir: 'v' }); s.setOn(true); return s; } },
  { name: '蜂鸣器 · 竖版（发声）', note: '喇叭符号+声波；上下两脚，通电发出声波动画',
    draw: (c) => { const b = c.buzzer(62, 52, { label: 'BUZ' }); b.setRinging(true); return b; } },
  { name: '蜂鸣器 · 横版（发声）', note: 'dir:"h" — 左右两脚，喇叭朝上',
    draw: (c) => { const b = c.buzzer(74, 60, { label: 'BUZ', dir: 'h' }); b.setRinging(true); return b; } },
];

const grid = document.getElementById('grid');
ITEMS.forEach(item => {
  const card = document.createElement('div'); card.className = 'card';
  const box = document.createElement('div'); box.className = 'symbolbox';
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', '0 0 150 110'); svg.setAttribute('width', '150'); svg.setAttribute('height', '110');
  svg.insertAdjacentHTML('afterbegin', Circuit.defs());
  box.appendChild(svg);
  const c = new Circuit(svg);
  item.draw(c);
  const name = document.createElement('div'); name.className = 'name'; name.textContent = item.name;
  const note = document.createElement('div'); note.className = 'note'; note.textContent = item.note;
  card.appendChild(box); card.appendChild(name); card.appendChild(note);
  grid.appendChild(card);
});
</script>
</body>
</html>
