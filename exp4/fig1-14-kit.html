<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图1.14 — 限流电阻（引擎版）</title>
<link rel="stylesheet" href="../assets/circuit.css">
</head>
<body>

<h1>图1.14 — 限流电阻（引擎版 / circuit-kit）</h1>

<div class="stage">
  <div id="circuit-wrap">
    <svg id="svg" width="300" height="330" viewBox="0 0 300 330"></svg>
  </div>

  <div class="panel">
    <div>
      <div class="panel-title">电源电压</div>
      <div style="display:flex;gap:8px">
        <button class="btn small on"  id="v-5"  data-v="5">5V</button>
        <button class="btn small off" id="v-9"  data-v="9">9V</button>
        <button class="btn small off" id="v-12" data-v="12">12V</button>
      </div>
    </div>
    <div>
      <div class="panel-title">电阻调节</div>
      <div class="slider-row">
        <div class="slider-head"><span>R₁ 阻值</span><b id="r-label">220 Ω</b></div>
        <input type="range" id="r-slider" min="50" max="1000" step="10" value="220">
      </div>
    </div>
    <div>
      <div class="panel-title">电流 / 电压读数</div>
      <div class="readout">
        <span id="ro-i">I = (5 − 2)V ÷ 220Ω = <b>13.6</b> mA</span><br>
        R₁ 压降 = <b id="ro-vr">3.0</b> V<br>
        D₁ 压降 = <b id="ro-vd">2.0</b> V
      </div>
    </div>
    <div>
      <div class="panel-title">安全状态</div>
      <div id="st-safe" class="status-item"><div class="status-dot"></div>安全工作（I ≤ 20mA）</div>
      <div id="st-over" class="status-item warn"><div class="status-dot"></div>电流过大（20–40mA）</div>
      <div id="st-burn" class="status-item danger"><div class="status-dot"></div>LED 烧毁（I &gt; 40mA）</div>
    </div>
    <div>
      <div class="panel-title">说明</div>
      <div class="stage-note" id="note"></div>
    </div>
  </div>
</div>

<script src="../assets/circuit-kit.js"></script>
<script>
const svg = document.getElementById('svg');
svg.insertAdjacentHTML('afterbegin', Circuit.defs());
const c = new Circuit(svg);

// ── DECLARE the circuit: place components, connect pins. No raw coordinates. ──
const SRC = c.source(60, 150, { label: '5V' });   // pos (60,122) · neg (60,178)
const R   = c.resistor(210, 100, { label: 'R₁', value: '220Ω' }); // a (210,70) · b (210,130)
const D1  = c.led(210, 190, { label: 'D₁' });     // anode (210,178) · cathode (210,202)
const GND = c.ground(60, 270);

c.wire(SRC.pos, R.a, { vfirst: true });   // + → top rail → resistor top
c.wire(R.b, D1.anode);                    // resistor → LED
c.wire(D1.cathode, [210, 270]);           // LED down to bottom rail
c.wire([210, 270], SRC.neg);              // bottom rail → up to battery −
c.node([60, 270]);

// particle loop (ordered rectangle) — through the same pins
const LOOP = [[60,122],[60,70],[210,70],[210,270],[60,270],[60,122]];
const flow = c.particles(LOOP);
c.fit(18);   // center content with an even, modest margin

// ── interactivity / formula / notes (unchanged spirit of the old version) ──
const VLED = 2.0, I_REF = 13.6;
let VCC = 5;
const $ = id => document.getElementById(id);
const vsrcText = SRC.labelEl; // the source's "5V" label element

function update() {
  const Rv = parseInt($('r-slider').value, 10);
  $('r-label').textContent = Rv + ' Ω';
  if (R._valEl) R._valEl.textContent = Rv + 'Ω';
  const I = ((VCC - VLED) / Rv) * 1000;
  const zone = I > 40 ? 'burn' : I > 20 ? 'over' : 'safe';

  $('ro-i').innerHTML = 'I = (' + VCC + ' − 2)V ÷ ' + Rv + 'Ω = <b>' + I.toFixed(1) + '</b> mA';
  $('ro-vr').textContent = (VCC - VLED).toFixed(1);
  $('ro-vd').textContent = VLED.toFixed(1);
  $('ro-i').classList.toggle('danger', zone === 'burn');

  ['st-safe','st-over','st-burn'].forEach(s => $(s).classList.remove('active'));
  const bright = Math.min(1, I / I_REF);
  if (zone === 'burn') {
    $('st-burn').classList.add('active');
    D1.set({ color: 'burnt' });
    c.lightAll('#2e3a50'); flow.set({ on: false });
    const Rsafe = Math.ceil((VCC - VLED) / 0.020 / 10) * 10;
    $('note').className = 'stage-note danger';
    $('note').innerHTML = '🔥 电流超过 40mA，D₁ 已烧毁！<br>' + VCC + 'V 下 R₁=' + Rv +
      'Ω 太小。拖回 R ≥ ' + Rsafe + 'Ω 可“换新 LED”恢复。';
  } else if (zone === 'over') {
    $('st-over').classList.add('active');
    D1.set({ color: 'amber', b: bright });
    c.lightAll('#f5a623'); flow.set({ on: true, color: '#f5a623', speed: I / I_REF });
    $('note').className = 'stage-note warn';
    $('note').innerHTML = '⚠ 电流偏大（20–40mA），LED 过亮发热。<br>再减小 R₁ 会超 40mA 烧毁。';
  } else {
    $('st-safe').classList.add('active');
    D1.set({ color: 'green', b: bright });
    c.lightAll('#22d36a'); flow.set({ on: true, color: '#22d36a', speed: Math.max(0.3, I / I_REF) });
    $('note').className = 'stage-note';
    $('note').innerHTML = '✅ 安全工作（I ≤ 20mA）。当前 ' + VCC + 'V：D₁ 恒占 2V，R₁ 扛 ' +
      (VCC - VLED).toFixed(0) + 'V。电源越高、要的电阻越大。';
  }
}

$('r-slider').addEventListener('input', update);
['v-5','v-9','v-12'].forEach(id => $(id).addEventListener('click', () => {
  VCC = parseFloat($(id).dataset.v);
  ['v-5','v-9','v-12'].forEach(x => { const on = x === id; $(x).classList.toggle('on', on); $(x).classList.toggle('off', !on); });
  if (vsrcText) vsrcText.textContent = VCC + 'V';
  update();
}));
update();
</script>
</body>
</html>
