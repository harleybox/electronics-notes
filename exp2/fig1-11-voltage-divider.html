<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图1.11 — 电阻分压</title>
<link rel="stylesheet" href="../assets/circuit.css">
<style>
  .vbar-wrap { display:flex; gap:12px; align-items:center; }
  .vbar { width:34px; height:150px; border:1px solid var(--border); border-radius:4px; overflow:hidden; position:relative; background:var(--panel-2); }
  .vseg { width:100%; }
  #vtap { position:absolute; left:-3px; right:-3px; height:0; border-top:2px dashed var(--green); }
  .vbar-legend { display:flex; flex-direction:column; gap:10px; font-size:11px; }
  .vbar-legend .row { display:flex; align-items:center; gap:6px; }
  .vbar-legend .sw { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
  .preset-row { display:flex; gap:8px; }
  .preset-row .btn { width:auto; flex:1; }
</style>
</head>
<body>

<h1>图1.11 — 电阻分压</h1>

<div class="stage">
  <div id="circuit-wrap">
    <svg id="svg" width="380" height="320" viewBox="0 0 380 320"></svg>
  </div>

  <div class="panel">
    <div>
      <div class="panel-title">电阻调节</div>
      <div class="slider-row">
        <div class="slider-head">R₁ <b id="r1-val">1000 Ω</b></div>
        <input type="range" id="r1" min="100" max="10000" step="100" value="1000">
      </div>
      <div class="slider-row">
        <div class="slider-head">R₂ <b id="r2-val">1000 Ω</b></div>
        <input type="range" id="r2" min="100" max="10000" step="100" value="1000">
      </div>
    </div>
    <div>
      <div class="panel-title">电压分配</div>
      <div class="vbar-wrap">
        <div class="vbar">
          <div class="vseg" id="seg-u1"></div>
          <div class="vseg" id="seg-u2"></div>
          <div id="vtap"></div>
        </div>
        <div class="vbar-legend">
          <div class="row"><span class="sw" style="background:var(--warn)"></span> U₁ <b id="leg-u1">6.00 V</b></div>
          <div class="row"><span class="sw" style="background:var(--green)"></span> U₂ <b id="leg-u2">6.00 V</b></div>
          <div style="color:var(--dim);font-size:10px">虚线 = 输出点电压 U₂</div>
        </div>
      </div>
    </div>
    <div>
      <div class="panel-title">电压读数</div>
      <div class="readout" id="ro-u2"></div>
      <div class="readout" id="ro-u1" style="margin-top:8px"></div>
      <div class="readout" id="ro-i" style="margin-top:8px"></div>
    </div>
    <div>
      <div class="panel-title">预设比例</div>
      <div class="preset-row">
        <button class="btn small" id="p-eq">相等 1:1</button>
        <button class="btn small" id="p-21">R₁:R₂ = 2:1</button>
      </div>
    </div>
    <div>
      <div class="panel-title">说明</div>
      <div class="stage-note">
        分压核心：调 R₁/R₂ 比值，从固定 12V 取出任意电压。阻值大的分得多（成正比），R₁=R₂ 时平分 6V。<br>
        <span style="color:var(--dim)">电压表并联在 R₂ 两端，理想内阻无穷大、几乎不取电流——所以它那条支路是灰的。</span>
      </div>
    </div>
  </div>
</div>

<script src="../assets/circuit-kit.js?v=9"></script>
<script>
const svg = document.getElementById('svg');
svg.insertAdjacentHTML('afterbegin', Circuit.defs());
const c = new Circuit(svg);

// ── DECLARE the divider ──
const SRC = c.source(60, 150, { label: '12V' });   // pos(60,130) neg(60,170)
const R1  = c.resistor(200, 120, { label: 'R₁', value: '1000Ω' }); // a(200,90) b(200,150)
const R2  = c.resistor(200, 210, { label: 'R₂', value: '1000Ω' }); // a(200,180) b(200,240)
const VM  = c.voltmeter(295, 205);                  // plus(295,165) minus(295,245)
const GND = c.ground(130, 300);

c.wire(SRC.pos, [200, 70], { vfirst: true }); // + → top rail (corner)
c.wire([200, 70], R1.a);                       // corner → R₁ (wire above R₁)
c.wire(R1.b, R2.a);                            // R₁ → node → R₂ (series)
c.node([200, 165]);                            // output node (R₁/R₂ junction)
c.wire(R2.b, [200, 300]);                      // R₂ → bottom rail
c.wire([200, 300], SRC.neg);                   // bottom rail → battery − (corner, no dot needed)
// voltmeter: parallel across R₂ (plus = node, minus = bottom rail) — no current
c.wire([200, 165], VM.plus);
c.wire(VM.minus, [295, 300]);
c.wire([295, 300], [200, 300]);

const LOOP = [[60,130],[60,70],[200,70],[200,300],[60,300],[60,130]];
const flow = c.particles(LOOP);
c.fit();

// ── interactivity ──
const VS = 12, BAR_H = 150;
const $ = id => document.getElementById(id);
function update() {
  const R1v = +$('r1').value, R2v = +$('r2').value, sum = R1v + R2v;
  const u2 = R2v / sum * VS, u1 = R1v / sum * VS, I = VS / sum;
  $('r1-val').textContent = R1v + ' Ω'; $('r2-val').textContent = R2v + ' Ω';
  if (R1._valEl) R1._valEl.textContent = R1v + 'Ω';
  if (R2._valEl) R2._valEl.textContent = R2v + 'Ω';
  VM.setReading('+' + u2.toFixed(2));
  // voltage bar
  const h1 = u1 / VS * BAR_H, h2 = u2 / VS * BAR_H;
  $('seg-u1').style.height = h1 + 'px'; $('seg-u1').style.background = 'linear-gradient(180deg,#7a5410,#f5a623)';
  $('seg-u2').style.height = h2 + 'px'; $('seg-u2').style.background = 'linear-gradient(180deg,#1a6b3a,#22d36a)';
  $('vtap').style.top = h1 + 'px';
  $('leg-u1').textContent = u1.toFixed(2) + ' V'; $('leg-u2').textContent = u2.toFixed(2) + ' V';
  $('ro-u2').innerHTML = 'U₂ = R₂/(R₁+R₂)×12V = <b>' + u2.toFixed(2) + ' V</b>';
  $('ro-u1').innerHTML = 'U₁ = R₁/(R₁+R₂)×12V = <b>' + u1.toFixed(2) + ' V</b>';
  $('ro-i').innerHTML  = 'I = 12V/(R₁+R₂) = <b>' + (I * 1000).toFixed(2) + ' mA</b>';
  c.lightLoop(LOOP, '#22d36a');   // main loop green; voltmeter branch stays gray
  flow.set({ on: true, color: '#22d36a', speed: Math.max(0.3, I * 1000 / 6) });
}
$('r1').addEventListener('input', update);
$('r2').addEventListener('input', update);
$('p-eq').addEventListener('click', () => { $('r1').value = 1000; $('r2').value = 1000; update(); });
$('p-21').addEventListener('click', () => { $('r1').value = 2000; $('r2').value = 1000; update(); });
update();
</script>
</body>
</html>
